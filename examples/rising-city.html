<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rising City — maplibre-transition</title>

    <!-- Theme, before first paint. Must stay a plain, non-module, non-defer script,
         and must sit above the stylesheet. See scripts/theme.js THEME_HEAD_SNIPPET. -->
    <script>
      (function(){var t=null;try{t=localStorage.getItem("mlt-theme")}catch(e){}
      if(t!=="light"&&t!=="dark"){t=window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"}
      var r=document.documentElement;r.setAttribute("data-theme",t);r.style.colorScheme=t})();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="styles/shared.css" />
    <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>

    <style>
      /* Page-local chrome only. Every colour still goes through a token. */
      .loading {
        position: absolute;
        left: 0.85rem;
        bottom: 1.9rem;
        z-index: 90;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.7rem;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.02em;
        color: var(--ink);
        background: var(--glass);
        border: 1px solid var(--hairline);
        border-radius: 999px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .loading[hidden] {
        display: none;
      }

      .loading .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      /* The height→colour ramp, printed as a legend under the readout. */
      .ramp-legend {
        padding: 0.7rem 0.9rem;
        border-top: 1px solid var(--hairline);
      }

      .ramp-bar {
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          var(--ramp-0) 0%,
          var(--ramp-1) 35%,
          var(--ramp-2) 62%,
          var(--ramp-3) 100%
        );
      }

      .ramp-scale {
        display: flex;
        justify-content: space-between;
        margin-top: 0.3rem;
        font-family: var(--font-mono);
        font-size: 0.64rem;
        color: var(--ink-muted);
      }

      .btn-row {
        display: flex;
        gap: 0.4rem;
      }

      .btn-row .btn {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="example-container">
        <div class="map-container">
          <div id="map" data-testid="map-container"></div>

          <div class="loading" id="loading" data-testid="loading">
            <span class="dot" aria-hidden="true"></span>
            <span id="loading-text" data-testid="loading-text">loading buildings…</span>
          </div>

          <div class="controls">
            <h2>Rising City</h2>
            <p>
              5,000 OSM buildings, two feature-state channels each:
              <span class="paint-prop">fill-extrusion-height</span> lifts,
              <span class="paint-prop">fill-extrusion-color</span> ignites. Staggered,
              so the skyline sweeps.
            </p>

            <!-- The live numbers sit ABOVE the controls: the panel is taller than the
                 map on short viewports and scrolls, and `channels 10,000` is the
                 headline of this page — it must never be the thing below the fold. -->
            <div class="readout">
              <div class="row">
                <span>channels</span>
                <span id="channel-count" data-testid="channel-count">0</span>
              </div>
              <div class="row">
                <span>animating</span>
                <span id="active-count" data-testid="active-count">0</span>
              </div>
              <div class="row">
                <span>camera</span>
                <span id="camera-state" data-testid="camera-state">idle</span>
              </div>
            </div>

            <div class="control-group">
              <div class="btn-row">
                <button
                  id="grow-btn"
                  class="btn"
                  data-testid="grow-btn"
                  aria-pressed="false"
                >
                  Grow city
                </button>
                <button
                  id="orbit-btn"
                  class="btn ghost"
                  data-testid="orbit-btn"
                  aria-pressed="false"
                  title="Toggle the camera orbit"
                >
                  Orbit
                </button>
              </div>
            </div>

            <div class="control-group">
              <label
                >Buildings
                <span class="value-display" id="building-count" data-testid="building-count"
                  >0</span
                ></label
              >
              <input
                type="range"
                id="buildings"
                data-testid="buildings-slider"
                min="0"
                max="3"
                value="3"
                step="1"
              />
            </div>

            <div class="control-group">
              <label
                >Max stagger
                <span class="value-display" id="stagger-value">1600ms</span></label
              >
              <input
                type="range"
                id="stagger"
                data-testid="stagger-slider"
                min="0"
                max="3000"
                value="1600"
                step="100"
              />
            </div>

            <div class="control-group">
              <label
                >Duration
                <span class="value-display" id="duration-value">1400ms</span></label
              >
              <input
                type="range"
                id="duration"
                data-testid="duration-slider"
                min="400"
                max="3000"
                value="1400"
                step="100"
              />
            </div>

            <div class="control-group">
              <label for="pattern">Rise pattern</label>
              <select id="pattern" data-testid="pattern-select">
                <option value="scatter" selected>Random scatter</option>
                <option value="wave">Radial wave from centre</option>
                <option value="tallest">Tallest first</option>
              </select>
            </div>

            <div class="control-group">
              <label for="effect">Effect</label>
              <select id="effect" data-testid="effect-select">
                <option value="mix" selected>Random mix</option>
                <option value="elastic">Elastic pop</option>
                <option value="bounce">Bounce</option>
                <option value="cubic">Smooth</option>
              </select>
            </div>

            <div class="ramp-legend">
              <div class="ramp-bar" aria-hidden="true"></div>
              <div class="ramp-scale">
                <span>0m</span>
                <span>fill-extrusion-color</span>
                <span>200m</span>
              </div>
            </div>

            <div class="credit">
              Buildings © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>
              contributors (ODbL).
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      import MaplibreTransition from "../dist/index.esm.js";
      import { initialTheme } from "./scripts/theme.js";
      import { mountChrome } from "./scripts/chrome.js";
      import { loadBasemap, applyBasemap } from "./scripts/basemap.js";
      import { frameMeter, mountFrameRail } from "./scripts/perf.js";

      mountChrome({
        title: "Rising City",
        kicker: "paint: { 'fill-extrusion-height': [0, h] }",
      });

      const CENTER = [-123.1185, 49.2825];
      const DATA_URL = "data/vancouver-buildings.geojson";
      const STEPS = [500, 1500, 3000, 5000];
      const MIX = ["bounce", "cubic", "elastic", "exp", "sin", "quad"];
      const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

      /* ---------------------------------------------------------------- colour
         The height ramp is theme-independent (CONTRACTS §3) so it is read from the
         tokens once. COLD is the unlit state a building ignites *from* — a scene
         colour on the map, not UI chrome, so it is not a token. */
      const COLD = "#111a2e";
      const css = getComputedStyle(document.documentElement);
      const RAMP = [0, 1, 2, 3].map((i) =>
        css.getPropertyValue(`--ramp-${i}`).trim()
      );
      const RAMP_STOPS = [0, 35, 90, 180]; // metres

      const hex = (c) => [
        parseInt(c.slice(1, 3), 16),
        parseInt(c.slice(3, 5), 16),
        parseInt(c.slice(5, 7), 16),
      ];
      const RAMP_RGB = RAMP.map(hex);
      const toHex = (v) =>
        "#" +
        v.map((n) => Math.round(n).toString(16).padStart(2, "0")).join("");

      /** Height (m) → the colour that building ignites to. */
      function rampFor(h) {
        if (h <= RAMP_STOPS[0]) return RAMP[0];
        for (let i = 1; i < RAMP_STOPS.length; i++) {
          if (h > RAMP_STOPS[i]) continue;
          const t = (h - RAMP_STOPS[i - 1]) / (RAMP_STOPS[i] - RAMP_STOPS[i - 1]);
          const a = RAMP_RGB[i - 1];
          const b = RAMP_RGB[i];
          return toHex([
            a[0] + (b[0] - a[0]) * t,
            a[1] + (b[1] - a[1]) * t,
            a[2] + (b[2] - a[2]) * t,
          ]);
        }
        return RAMP[RAMP.length - 1];
      }

      /* ------------------------------------------------------------------- map */
      const theme = initialTheme();

      const map = new maplibregl.Map({
        container: "map",
        style: await loadBasemap(theme), // sky + light are baked in per theme
        center: CENTER,
        zoom: reduced ? 15.2 : 13.5,
        pitch: reduced ? 58 : 0,
        bearing: -18,
        antialias: true,
        maxPitch: 75,
      });

      map.addControl(
        new maplibregl.NavigationControl({ visualizePitch: true }),
        "top-left"
      );
      MaplibreTransition.init(map);

      const meter = frameMeter();
      mountFrameRail(document.querySelector(".frame-rail"), meter);

      // The basemap swaps under the running transitions. Our overlay's paint is
      // owned by the plugin (CONTRACTS §1) and the height ramp is theme-independent,
      // so there is nothing to recolour here — the feature state carries straight
      // through the restyle. Never setPaintProperty on a property the plugin owns.
      let basemapSwaps = 0;
      window.addEventListener("themechange", async (e) => {
        await applyBasemap(map, e.detail.theme);
        basemapSwaps++;
      });

      /* ------------------------------------------------------------------ data */
      let buildings = []; // feature.id === index, baked into the file
      let dists = []; // normalised distance from CENTRE, for the wave pattern
      let maxHeight = 1;
      let active = STEPS[Number(document.getElementById("buildings").value)];
      let grown = false;
      let lit = 0; // highest building index that has ever been given feature state

      const el = (id) => document.getElementById(id);
      const feature = (i) => ({
        id: i,
        source: "buildings",
        sourceLayer: undefined,
        layer: { id: "buildings-layer" },
      });

      function centroidDistances(features) {
        const raw = features.map((b) => {
          const ring = b.geometry.coordinates[0];
          const n = ring.length - 1;
          let x = 0;
          let y = 0;
          for (let i = 0; i < n; i++) {
            x += ring[i][0];
            y += ring[i][1];
          }
          return Math.hypot(x / n - CENTER[0], y / n - CENTER[1]);
        });
        const max = Math.max(...raw) || 1;
        return raw.map((d) => d / max);
      }

      function delayFor(i, pattern, maxStagger) {
        if (maxStagger === 0) return 0;
        if (pattern === "wave") return dists[i] * maxStagger;
        if (pattern === "tallest")
          return (1 - buildings[i].properties.height / maxHeight) * maxStagger;
        return Math.random() * maxStagger; // scatter
      }

      /* ------------------------------------------------------------ transitions */

      /**
       * Two channels per building — 5000 × 2 = 10,000 samplers on one rAF.
       *
       * Every start value is `null`, always (CONTRACTS §1). A `null` start means
       * "from wherever this property is right now", which resolves to the
       * feature's current state or, when it has none, to the layer's paint
       * fallback — literally `0` and `COLD`, because both animated properties are
       * declared as literals below. So from rest `[null, h]` is byte-identical to
       * `[0, h]`, and mid-flight it is the only safe form: an explicit start on a
       * feature that is already at 45m yields the three-stop scale [45, 0, h] and
       * the city visibly dives to zero before it rises.
       */
      function growRange(from, to, o = {}) {
        const maxStagger = o.stagger ?? Number(el("stagger").value);
        const duration = o.duration ?? Number(el("duration").value);
        const pattern = o.pattern ?? el("pattern").value;
        const effect = o.effect ?? el("effect").value;

        for (let i = from; i < to; i++) {
          const h = buildings[i].properties.height;
          const ease =
            effect === "mix" ? MIX[(Math.random() * MIX.length) | 0] : effect;

          map.transition(feature(i), {
            duration,
            delay: delayFor(i, pattern, maxStagger),
            ease,
            paint: {
              "fill-extrusion-height": [null, h],
              "fill-extrusion-color": [null, rampFor(h)],
            },
          });
        }

        // Anything we have ever written feature state to must be collapsible, even
        // if the slider has since filtered it out of view — otherwise it would pop
        // back up at full height the moment it is revealed again.
        lit = Math.max(lit, to);
      }

      function grow() {
        growRange(0, active);
        grown = true;
        syncButton();
      }

      function collapse() {
        const duration = Math.min(Number(el("duration").value), 900);
        const maxStagger = Number(el("stagger").value) * 0.5;
        const pattern = el("pattern").value;

        for (let i = 0; i < lit; i++) {
          map.transition(feature(i), {
            duration,
            delay: delayFor(i, pattern, maxStagger),
            ease: "cubic",
            paint: {
              "fill-extrusion-height": [null, 0],
              "fill-extrusion-color": [null, COLD],
            },
          });
        }

        grown = false;
        syncButton();
      }

      function syncButton() {
        el("grow-btn").textContent = grown ? "Collapse" : "Grow city";
        el("grow-btn").setAttribute("aria-pressed", String(grown));
      }

      /* ---------------------------------------------------------------- camera */
      let orbiting = false;
      let userOwnsCamera = false; // once true, the page never moves the camera again

      function setCameraState(s) {
        el("camera-state").textContent = s;
      }

      function startOrbit() {
        if (!orbiting) return;
        // MapLibre owns the camera rAF. A hand-rolled loop here would contend with
        // the transition engine's single rAF.
        map.easeTo({
          bearing: map.getBearing() + 120,
          duration: 20000, // 120° / 20s === 60s per revolution
          easing: (t) => t,
          // `essential` opts out of MapLibre's own prefers-reduced-motion handling,
          // which would otherwise force duration to 0 and make the orbit a no-op.
          // That handling is right for AUTOPLAY, and we already honour it: `reduced`
          // gates the on-load approach and the auto-orbit. But the orbit button is
          // an explicit request from the user, and an explicit request is essential.
          essential: true,
        });
        setCameraState("orbit");
      }

      function beginOrbit() {
        if (orbiting) return;
        orbiting = true;
        userOwnsCamera = false;
        el("orbit-btn").setAttribute("aria-pressed", "true");
        startOrbit();
      }

      function endOrbit(reason, stop) {
        const was = orbiting;
        orbiting = false;
        el("orbit-btn").setAttribute("aria-pressed", "false");
        if (was && stop) map.stop();
        setCameraState(reason);
      }

      /** Any user gesture wins over the choreography — permanently. */
      function takeOver() {
        userOwnsCamera = true;
        if (orbiting) endOrbit("manual", true);
        else setCameraState("manual");
      }

      for (const ev of ["dragstart", "wheel", "mousedown", "touchstart"]) {
        map.on(ev, takeOver);
      }

      map.on("moveend", () => {
        if (orbiting) startOrbit();
        else if (!map.isMoving() && !userOwnsCamera) setCameraState("idle");
      });

      el("orbit-btn").addEventListener("click", () => {
        orbiting ? endOrbit("idle", true) : beginOrbit();
      });

      /* ----------------------------------------------------------------- counts */
      function setBuildings(n) {
        const next = Math.max(0, Math.min(n | 0, buildings.length));
        const prev = active;
        active = next;

        // setFilter, never setData: replacing the source data would destroy every
        // feature state the plugin has written.
        if (map.getLayer("buildings-layer")) {
          map.setFilter("buildings-layer", ["<", ["id"], active]);
        }
        el("building-count").textContent = active.toLocaleString();
        el("channel-count").textContent = (active * 2).toLocaleString();

        // Newly revealed buildings that have never been lit have no feature state,
        // so they would sit flat. Bring just the delta up to meet the skyline.
        if (grown && active > lit) growRange(lit, active);
      }

      /* ------------------------------------------------------------------- boot */
      const ready = (async () => {
        const [data] = await Promise.all([
          fetch(DATA_URL).then((r) => {
            if (!r.ok) throw new Error(`buildings: HTTP ${r.status}`);
            return r.json();
          }),
          new Promise((r) => (map.loaded() ? r() : map.once("load", r))),
        ]);

        buildings = data.features;
        maxHeight = buildings.reduce(
          (m, b) => Math.max(m, b.properties.height),
          1
        );
        dists = centroidDistances(buildings);

        // ids are baked into the file — no generateId (CONTRACTS §6).
        map.addSource("buildings", { type: "geojson", data });

        map.addLayer({
          id: "buildings-layer",
          type: "fill-extrusion",
          source: "buildings",
          filter: ["<", ["id"], active],
          paint: {
            // Both animated properties MUST be literals. If the colour were an
            // ["interpolate", …, ["get","height"]] expression, the plugin's
            // fallback would become a mixed coalesce/expression construct.
            "fill-extrusion-height": 0,
            "fill-extrusion-color": COLD,
            "fill-extrusion-base": 0,
            "fill-extrusion-opacity": 0.94, // layer-constant: NOT animatable
            "fill-extrusion-vertical-gradient": true,
          },
        });

        setBuildings(active);
        el("loading").hidden = true;

        if (!reduced) {
          // The camera flies in while the grow wavefront sweeps the skyline.
          map.easeTo({ pitch: 58, zoom: 15.2, duration: 2200 });
          setCameraState("approach");
          map.once("moveend", () => {
            if (!userOwnsCamera) beginOrbit();
          });
          grow();
        }
      })();

      ready.catch((err) => {
        el("loading-text").textContent = `failed: ${err.message}`;
        console.error(err);
      });

      /* --------------------------------------------------------------- controls */
      el("buildings").addEventListener("input", (e) => {
        setBuildings(STEPS[Number(e.target.value)]);
      });
      el("stagger").addEventListener("input", (e) => {
        el("stagger-value").textContent = `${e.target.value}ms`;
      });
      el("duration").addEventListener("input", (e) => {
        el("duration-value").textContent = `${e.target.value}ms`;
      });
      el("grow-btn").addEventListener("click", () => {
        grown ? collapse() : grow();
      });

      const activeEl = el("active-count");
      const tick = () => {
        activeEl.textContent = map.transition.transitions.size.toLocaleString();
        requestAnimationFrame(tick);
      };
      tick();

      /* ------------------------------------------------------------ test hooks */
      window.__testHooks = {
        map,
        meter,
        getTransitionCount: () => map.transition.transitions.size,
        waitForLoad: () => ready,
        get buildingCount() {
          return active;
        },
        get totalBuildings() {
          return buildings.length;
        },
        get basemapSwaps() {
          return basemapSwaps;
        },
        grow: () => grow(),
        collapse,
        setBuildings,
        // Test-only: a grow with explicit options, so specs never have to race the
        // slider's 3000ms ceiling. Under a saturated CPU (8 parallel headless
        // workers, software WebGL) a 3s transition can complete before the spec's
        // next CDP round-trip lands, which silently turns a mid-flight assertion
        // into an at-rest one. Same code path, same two channels.
        growWith: (opts) => {
          growRange(0, active, opts || {});
          grown = true;
          syncButton();
        },
        stopCamera: () => takeOver(), // freeze the choreography for deterministic tests
        isGrown: () => grown,
        targetHeight: (id) => buildings[id].properties.height,
        stateOf: (id) => map.getFeatureState({ source: "buildings", id }),
        rampFor,
        COLD,
      };
    </script>
  </body>
</html>
